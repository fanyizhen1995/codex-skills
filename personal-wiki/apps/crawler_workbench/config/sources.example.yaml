    schedule: daily
    auto_ingest: true
    auth_required: false
    topic: NCCL closed GitHub issues
  - id: sglang-github-closed-issues-prs
    name: SGLang closed GitHub issues and pull requests
    type: github
    target_domain: ai_infra
    url: https://api.github.com/repos/sgl-project/sglang?sort=updated&direction=desc
