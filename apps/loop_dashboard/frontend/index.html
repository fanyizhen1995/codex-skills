<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Loop Dashboard</title>
    <link rel="stylesheet" href="/assets/styles.css">
  </head>
  <body>
    <header class="topbar">
      <div>
        <h1>Loop Dashboard</h1>
        <p class="subtitle">本地只读运行监控</p>
      </div>
      <div class="poll-state" id="poll-state" aria-live="polite">等待同步</div>
    </header>

    <section class="project-strip" data-testid="project-status" aria-label="项目状态">
      <div id="project-status-content" class="project-strip-content">
        <div class="muted">正在读取项目状态...</div>
      </div>
    </section>

    <main class="workbench" id="app">
      <aside class="column column-left" aria-label="项目和运行列表">
        <section class="panel runs-panel" aria-labelledby="run-list-title">
          <div class="section-heading">
            <h2 id="run-list-title">运行列表</h2>
          </div>
          <div class="run-list" data-testid="run-list" id="run-list" aria-live="polite">
            <div class="empty">暂无运行记录</div>
          </div>
          <div class="completed-runs is-hidden" data-testid="completed-runs" id="completed-runs" aria-hidden="true"></div>
        </section>
      </aside>

      <section class="column column-main" aria-label="运行详情">
        <section class="panel detail-panel" data-testid="run-detail" id="run-detail" aria-live="polite">
          <div id="run-detail-heading" class="detail-heading"></div>
          <div id="run-detail-content" class="empty">请选择一个运行</div>
          <div class="detail-tabs" data-testid="detail-tabs" id="detail-tabs" role="tablist" aria-label="运行详情视图">
            <button type="button" role="tab" data-tab="overview" aria-controls="tab-overview">概览</button>
            <button type="button" role="tab" data-tab="agents" aria-controls="tab-agents">Agent结果</button>
            <button type="button" role="tab" data-tab="acceptance" aria-controls="tab-acceptance">验收</button>
            <button type="button" role="tab" data-tab="logs" aria-controls="tab-logs">日志</button>
            <button type="button" role="tab" data-tab="diagnostics" aria-controls="tab-diagnostics">阻塞诊断</button>
            <button type="button" role="tab" data-tab="artifacts" aria-controls="tab-artifacts">产物</button>
          </div>

          <div class="tab-panels">
            <section class="tab-panel" data-testid="tab-overview" id="tab-overview" role="tabpanel">
              <div class="section-heading compact-heading">
                <h2 id="flow-title">流程图</h2>
              </div>
              <div class="flow-diagram" data-testid="flow-diagram" id="flow-diagram">
                <div class="empty">等待运行数据</div>
              </div>
            </section>

            <section class="tab-panel" data-testid="tab-agents" id="tab-agents" role="tabpanel" hidden>
              <div class="section-heading compact-heading">
                <h2 id="agents-title">Agent 结果</h2>
              </div>
              <div class="agent-cards" data-testid="agent-cards" id="agent-cards">
                <div class="empty">等待 Agent 数据</div>
              </div>
            </section>

            <section class="tab-panel" data-testid="tab-acceptance" id="tab-acceptance" role="tabpanel" hidden>
              <div id="acceptance-content">
                <div class="empty">暂无结构化验收场景</div>
              </div>
            </section>

            <section class="tab-panel" data-testid="tab-logs" id="tab-logs" role="tabpanel" hidden>
              <div class="filters" aria-label="日志过滤">
                <label class="filter-control">
                  <span>类型</span>
                  <select data-testid="log-kind-filter" id="log-kind-filter">
                    <option value="all">全部</option>
                    <option value="stdout">stdout</option>
                    <option value="stderr">stderr</option>
                    <option value="artifact">artifact</option>
                    <option value="log">log</option>
                    <option value="skill">skill</option>
                    <option value="agent">agent</option>
                    <option value="tool">tool</option>
                  </select>
                </label>
                <label class="filter-control">
                  <span>Agent</span>
                  <select data-testid="agent-filter" id="agent-filter">
                    <option value="all">全部</option>
                    <option value="planner">planner</option>
                    <option value="generator">generator</option>
                    <option value="evaluator">evaluator</option>
                  </select>
                </label>
                <label class="filter-control">
                  <span>关键词</span>
                  <input data-testid="log-keyword-filter" id="log-keyword-filter" type="search" placeholder="输入关键词">
                </label>
              </div>
              <div class="log-list" data-testid="log-list" id="log-list">
                <div class="empty">暂无日志</div>
              </div>
            </section>

            <section class="tab-panel" data-testid="tab-diagnostics" id="tab-diagnostics" role="tabpanel" hidden>
              <div class="blocked-diagnostics" data-testid="blocked-diagnostics" id="blocked-diagnostics">
                <div class="empty">暂无阻塞诊断</div>
              </div>
            </section>

            <section class="tab-panel" data-testid="tab-artifacts" id="tab-artifacts" role="tabpanel" hidden>
              <div id="artifact-content">
                <div class="empty">暂无产物路径</div>
              </div>
            </section>
          </div>
        </section>
      </section>
    </main>

    <script src="/assets/app.js" defer></script>
  </body>
</html>
