<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Loop Dashboard</title>
    <link rel="stylesheet" href="/assets/styles.css">
  </head>
  <body>
    <header class="topbar">
      <div>
        <h1>Loop Dashboard</h1>
        <p class="subtitle">项目级 Supervisor 控制面与任务运行历史</p>
      </div>
      <div class="top-status" id="top-status" aria-live="polite">
        <span class="status-chip">等待同步</span>
      </div>
    </header>
    <div class="project-strip" id="project-status" data-testid="project-status">正在读取项目状态...</div>

    <div class="layout">
      <aside class="sidebar" aria-label="项目控制面和运行历史">
        <h2 class="sidebar-title">项目控制面</h2>
        <button class="nav-item is-active" id="supervisor-nav" type="button">
          <span class="nav-title"><span>Loop Supervisor</span><span class="status-text good" id="supervisor-nav-status">不可用</span></span>
          <span class="nav-meta">统一决策 · Worker 执行 · Reviewer 审视</span>
        </button>
        <h2 class="sidebar-title history-title">运行历史</h2>
        <div id="run-list" class="run-list" data-testid="run-list"><div class="empty-state">正在读取运行记录...</div></div>
        <div id="run-list-pager"></div>
      </aside>

      <main class="main">
        <section id="supervisor-view" data-testid="supervisor-panel" aria-labelledby="supervisor-title">
          <div id="supervisor-content">
            <section class="hero">
              <div class="hero-copy">
                <h2 id="supervisor-title">Loop Supervisor</h2>
                <p class="subtitle">唯一控制角色。负责 reconcile、恢复、Reviewer、服务保活、决策执行和 Worker 调度。</p>
              </div>
              <div class="hero-actions" id="supervisor-hero-status"><span class="status-chip">正在读取</span></div>
            </section>

            <nav class="tabs" role="tablist" aria-label="Supervisor 详情">
              <button class="tab is-active" type="button" role="tab" aria-selected="true" data-supervisor-tab="overview">概览</button>
              <button class="tab" type="button" role="tab" aria-selected="false" data-supervisor-tab="services">服务</button>
              <button class="tab" type="button" role="tab" aria-selected="false" data-supervisor-tab="recovery">任务恢复</button>
              <button class="tab" type="button" role="tab" aria-selected="false" data-supervisor-tab="reviewer">Reviewer</button>
              <button class="tab" type="button" role="tab" aria-selected="false" data-supervisor-tab="decisions">决策</button>
              <button class="tab" type="button" role="tab" aria-selected="false" data-supervisor-tab="skills">Skill 治理</button>
              <button class="tab" type="button" role="tab" aria-selected="false" data-supervisor-tab="config">配置</button>
            </nav>
            <div id="supervisor-panel-content" class="view-panel" role="tabpanel"><div class="empty-state">正在读取 Supervisor 数据...</div></div>
          </div>
        </section>

        <section id="run-view" class="is-hidden" data-testid="run-detail" aria-labelledby="run-title">
          <section class="hero">
            <div class="hero-copy">
              <h2 id="run-title">运行详情</h2>
              <p class="subtitle" id="run-subtitle">请选择一条运行记录</p>
            </div>
            <div class="hero-actions" id="run-hero-status"></div>
          </section>
          <div id="run-overview"></div>
          <nav class="tabs" role="tablist" aria-label="运行详情">
            <button class="tab is-active" type="button" role="tab" aria-selected="true" data-run-tab="overview">概览</button>
            <button class="tab" type="button" role="tab" aria-selected="false" data-run-tab="children">子任务</button>
            <button class="tab" type="button" role="tab" aria-selected="false" data-run-tab="agents">Agent 结果</button>
            <button class="tab" type="button" role="tab" aria-selected="false" data-run-tab="acceptance">验收</button>
            <button class="tab" type="button" role="tab" aria-selected="false" data-run-tab="logs">日志</button>
            <button class="tab" type="button" role="tab" aria-selected="false" data-run-tab="diagnostics">阻塞诊断</button>
            <button class="tab" type="button" role="tab" aria-selected="false" data-run-tab="artifacts">产物</button>
          </nav>
          <div id="run-toolbar"></div>
          <div id="run-panel-content" class="view-panel" role="tabpanel"><div class="empty-state">请选择一条运行记录</div></div>
        </section>
      </main>
    </div>

    <script src="/assets/pagination.js" defer></script>
    <script src="/assets/supervisor.js" defer></script>
    <script src="/assets/app.js" defer></script>
  </body>
</html>
